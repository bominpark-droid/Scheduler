<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffaa00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SP대시보드">
<title>SP미디어텍</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--s1:#1a1a1a;--s2:#222;--s3:#2a2a2a;
  --b1:#2e2e2e;--b2:#3a3a3a;
  --t1:#f0f0f0;--t2:#c8c8c8;--t3:#888;
  --red:#ff4444;--rbg:rgba(255,68,68,.13);
  --amb:#ffaa00;--abg:rgba(255,170,0,.13);
  --blu:#4da6ff;--bbg:rgba(77,166,255,.13);
  --gry:#999;--gbg:rgba(150,150,150,.12);
  --tel:#33cc88;--tbg:rgba(51,204,136,.15);
  --r:12px;--rs:8px;--rx:6px;
  --f:-apple-system,'Apple SD Gothic Neo',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--f);font-size:14px;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{padding:10px 16px 8px;background:var(--bg);border-bottom:1px solid var(--b1);flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:8px}
.logo{font-size:14px;font-weight:700;flex-shrink:0}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#syncStatus{font-size:10px;color:var(--t3)}
.sync-btn{font-size:10px;padding:3px 8px;border-radius:var(--rx);background:var(--s2);border:1px solid var(--b2);color:var(--t2);cursor:pointer}
.dt{font-size:11px;color:var(--t3)}
.focus-bar{display:flex;align-items:center;gap:8px;background:var(--s1);border-radius:var(--rs);padding:7px 12px}
.fl{font-size:10px;color:var(--t3);white-space:nowrap}
.fi{flex:1;background:transparent;border:none;outline:none;font-size:12px;font-weight:500;color:var(--t1);font-family:var(--f)}
.fi::placeholder{color:var(--t3);font-weight:400}
.stats{display:flex;gap:6px;padding:8px 16px;flex-shrink:0}
.stat{background:var(--s1);border-radius:var(--rx);padding:6px 12px;text-align:center;flex:1}
.sn{font-size:18px;font-weight:700}.sl{font-size:9px;color:var(--t3);margin-top:1px}
.sn-r{color:var(--red)}.sn-a{color:var(--amb)}.sn-w{color:var(--t1)}.sn-g{color:var(--tel)}
.qadd{padding:0 16px 8px;flex-shrink:0;display:flex;gap:6px}
.qi{flex:1;background:var(--s1);border:1.5px solid var(--b2);border-radius:var(--rs);padding:9px 12px;font-size:13px;color:var(--t1);font-family:var(--f);outline:none;transition:border-color .2s}
.qi:focus{border-color:var(--amb)}
.qi::placeholder{color:var(--t3)}
.qb{height:40px;padding:0 14px;border-radius:var(--rs);background:var(--amb);border:none;color:#000;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.qb:active{opacity:.7}
.inbox-wrap{padding:0 16px 8px;flex-shrink:0;display:none}
.inbox-wrap.on{display:block}
.ib-box{background:var(--s1);border:1px dashed var(--b2);border-radius:var(--rs);overflow:hidden}
.ib-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--b1)}
.ib-title{font-size:11px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:5px}
.ib-cnt{background:var(--abg);color:var(--amb);font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.ib-list{max-height:110px;overflow-y:auto}
.ib-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid var(--b1)}
.ib-item:last-child{border:none}
.ib-text{flex:1;font-size:12px;color:var(--t2)}
.ib-btns{display:flex;gap:3px;flex-shrink:0}
.ibb{font-size:10px;font-weight:700;padding:2px 7px;border-radius:var(--rx);border:none;cursor:pointer}
.ibb1{background:var(--rbg);color:var(--red)}.ibb2{background:var(--abg);color:var(--amb)}
.ibb3{background:var(--bbg);color:var(--blu)}.ibb4{background:var(--gbg);color:var(--gry)}
.ibb-x{background:transparent;color:var(--t3);font-size:13px;padding:2px 5px;border:none;cursor:pointer;line-height:1}
.today-sec{margin:0 16px 8px;background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);flex-shrink:0;overflow:hidden}
.today-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--b1)}
.today-title{font-size:12px;font-weight:700;color:var(--amb)}
.today-hint{font-size:10px;color:var(--t3)}
.today-empty{font-size:11px;color:var(--t3);padding:12px;text-align:center;font-style:italic}
.td-item{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--b1)}
.td-item:last-child{border:none}
.td-item.td-done{opacity:.4}
.td-num{width:19px;height:19px;border-radius:50%;background:var(--abg);color:var(--amb);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.td-item.td-done .td-num{background:var(--tbg);color:var(--tel)}
.td-qdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.td-text{flex:1;font-size:12px;color:var(--t2)}
.td-item.td-done .td-text{text-decoration:line-through;color:var(--t3)}
.td-chk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.td-item.td-done .td-chk{background:var(--tel);border-color:var(--tel)}
.td-up,.td-dn{background:transparent;border:none;color:var(--t3);font-size:11px;cursor:pointer;padding:2px 3px;line-height:1}
.td-del{background:transparent;border:none;color:var(--t3);font-size:13px;cursor:pointer;padding:2px 4px;line-height:1}
.td-del:hover{color:var(--red)}
.view-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.pane{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 16px 90px}
.pane.on{display:block}
.matrix-lbl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.07em;margin-bottom:7px}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
@media(min-width:768px){
  .matrix-grid{grid-template-rows:1fr 1fr}
  .pane{padding:10px 20px 90px}
  .qadd,.inbox-wrap,.hdr{padding-left:20px;padding-right:20px}
  .stats{padding:8px 20px}
  .today-sec{margin:0 20px 8px}
}
.qcard{background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);display:flex;flex-direction:column}
.qcard-hd{padding:10px 11px 6px;border-bottom:1px solid var(--b1);flex-shrink:0}
.qcard-hd-row{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.qdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.qn{font-size:12px;font-weight:700;flex:1}
.qcnt{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;flex-shrink:0}
.qsub{font-size:10px;color:var(--t3)}
.q1c .qdot{background:var(--red)}.q1c .qn{color:var(--red)}.q1c .qcnt{background:var(--rbg);color:var(--red)}
.q2c .qdot{background:var(--amb)}.q2c .qn{color:var(--amb)}.q2c .qcnt{background:var(--abg);color:var(--amb)}
.q3c .qdot{background:var(--blu)}.q3c .qn{color:var(--blu)}.q3c .qcnt{background:var(--bbg);color:var(--blu)}
.q4c .qdot{background:var(--gry)}.q4c .qn{color:var(--gry)}.q4c .qcnt{background:var(--gbg);color:var(--gry)}
.qtask-list{overflow-y:auto;max-height:240px;flex:1}
@media(min-width:768px){.qtask-list{max-height:300px}}
.ti{display:flex;align-items:flex-start;gap:6px;padding:7px 11px;border-bottom:1px solid var(--b1);position:relative}
.ti:last-child{border:none}
.ti.today-pick{background:rgba(255,170,0,.05)}
.ti.done{opacity:.3}
.tchk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--b2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.ti.done .tchk{background:var(--tel);border-color:var(--tel)}
.ck{opacity:0}
.ti.done .ck{opacity:1}
.tbody{flex:1;min-width:0;cursor:pointer}
.tt{font-size:11px;color:var(--t1);line-height:1.35}
.ti.done .tt{text-decoration:line-through;color:var(--t3)}
.tmeta{display:flex;align-items:center;gap:3px;margin-top:2px;flex-wrap:wrap}
.tag{font-size:9px;padding:1px 5px;border-radius:20px;font-weight:600}
.tg-p{background:#1a1040;color:#9988ff}
.tg-t{background:#1a1030;color:#aa88ff}
.tg-w{background:var(--gbg);color:var(--gry)}
.tdays{font-size:9px}
.today-num{width:16px;height:16px;border-radius:50%;background:var(--amb);color:#000;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ti-right{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-top:1px}
.mv{font-size:9px;font-weight:700;padding:2px 5px;border-radius:var(--rx);border:none;cursor:pointer;background:var(--s3);color:var(--t2)}
.mv:active{opacity:.6}
.del-btn{background:transparent;border:none;color:var(--t3);font-size:14px;cursor:pointer;padding:1px 4px;line-height:1}
.del-btn:hover{color:var(--red)}
@media(min-width:768px){.ti-right{opacity:0;transition:opacity .2s}.ti:hover .ti-right{opacity:1}}
.q-add-row{display:flex;gap:4px;padding:7px 10px;border-top:1px solid var(--b1);background:var(--s2);flex-shrink:0}
.q-ai{flex:1;background:var(--s3);border:1px solid var(--b1);border-radius:var(--rx);padding:5px 8px;font-size:11px;color:var(--t1);font-family:var(--f);outline:none;min-width:0}
.q-ai::placeholder{color:var(--t3)}
.q-ab{background:transparent;border:none;color:var(--t2);font-size:16px;cursor:pointer;padding:3px 6px;flex-shrink:0;line-height:1}
.done-toggle{font-size:11px;color:var(--t3);padding:8px 0;cursor:pointer;user-select:none}
.done-section{background:var(--s1);border-radius:var(--r);overflow:hidden;margin-bottom:8px;display:none}
.done-section.on{display:block}
.di{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--b1);opacity:.4;cursor:pointer}
.di:last-child{border:none}
.di:hover{opacity:.65}
.di-chk{width:13px;height:13px;border-radius:3px;background:var(--tel);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.di-text{flex:1;font-size:12px;color:var(--t2);text-decoration:line-through}
.di-date{font-size:10px;color:var(--t3);white-space:nowrap}
.di-del{background:transparent;border:none;color:var(--t3);font-size:13px;cursor:pointer;padding:2px 4px;line-height:1}
.di-del:hover{color:var(--red)}
.memo-wrap{display:flex;flex-direction:column;height:100%;gap:8px}
.memo-area{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;font-size:13px;color:var(--t1);font-family:var(--f);resize:none;outline:none;line-height:1.7;min-height:200px}
.memo-area::placeholder{color:var(--t3)}
.memo-footer{font-size:11px;color:var(--t3);text-align:right}
.arch-day{background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);margin-bottom:10px;overflow:hidden}
.arch-day-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--b1)}
.arch-date{font-size:12px;font-weight:700;color:var(--t2)}
.arch-cnt{font-size:10px;color:var(--t3)}
.arch-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--b1)}
.arch-item:last-child{border:none}
.arch-chk{width:13px;height:13px;border-radius:3px;background:var(--tel);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.arch-text{flex:1;font-size:12px;color:var(--t2)}
.arch-q{font-size:9px;padding:1px 5px;border-radius:20px;font-weight:600}
.arch-time{font-size:10px;color:var(--t3)}
.arch-empty{font-size:12px;color:var(--t3);text-align:center;padding:30px;font-style:italic}
.arch-lbl{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.07em;margin-bottom:10px}
.bnav{display:flex;background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0}
.nb{flex:1;padding:9px 6px 13px;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;color:var(--t3);font-family:var(--f);font-size:10px;font-weight:500;transition:color .15s}
.nb.active{color:var(--amb)}
.nb:hover{color:var(--t2)}
.ni{font-size:19px;line-height:1}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s3);color:var(--t1);padding:8px 16px;border-radius:var(--rs);font-size:12px;opacity:0;transition:all .25s;z-index:400;pointer-events:none;border:1px solid var(--b2);white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-row">
      <div class="logo">SP미디어텍</div>
      <div class="hdr-right">
        <span id="userLabel" style="font-size:11px;color:var(--amb);font-weight:600"></span>
        <span id="syncStatus">로딩 중...</span>
        <button class="sync-btn" onclick="syncNow()">↻ 동기화</button>
        <div class="dt" id="dtLabel"></div>
      </div>
    </div>
    <div class="focus-bar">
      <div class="fl">이번 주 포커스</div>
      <input class="fi" id="focusInp" placeholder="가장 중요한 결과물 한 줄...">
    </div>
  </div>
  <div class="stats" id="statsRow"></div>
  <div class="qadd">
    <input class="qi" id="qi" placeholder="할 일 떠오르면 바로 여기... (엔터로 인박스에 추가)">
    <button class="qb" onclick="quickAdd()">+ 인박스</button>
  </div>
  <div class="inbox-wrap" id="ibWrap">
    <div class="ib-box">
      <div class="ib-hd">
        <div class="ib-title">인박스 <span class="ib-cnt" id="ibCnt">0</span></div>
        <div style="font-size:10px;color:var(--t3)">사분면 선택해서 분류</div>
      </div>
      <div class="ib-list" id="ibList"></div>
    </div>
  </div>
  <div class="today-sec">
    <div class="today-hd">
      <div class="today-title">⚡ 오늘 할 일 <span id="todayCnt" style="font-size:10px;color:var(--t3);font-weight:400"></span></div>
      <div class="today-hint">태스크 클릭 → 순서 추가</div>
    </div>
    <div id="todayList"></div>
  </div>
  <div class="view-wrap">
    <div class="pane on" id="pane-matrix">
      <div class="matrix-lbl">우선순위 매트릭스</div>
      <div class="matrix-grid" id="matrixGrid"></div>
      <div class="done-toggle" id="doneToggle" onclick="toggleDoneSection()">▸ 완료 항목 보기 (<span id="doneCnt">0</span>개)</div>
      <div class="done-section" id="doneSection"></div>
    </div>
    <div class="pane" id="pane-memo">
      <div class="memo-wrap">
        <textarea class="memo-area" id="memoArea" placeholder="자유롭게 메모하세요..."></textarea>
        <div class="memo-footer" id="memoFooter"></div>
      </div>
    </div>
    <div class="pane" id="pane-archive">
      <div class="arch-lbl">완료 항목 — 날짜별 아카이브</div>
      <div id="archiveList"></div>
    </div>
  </div>
  <nav class="bnav">
    <button class="nb active" id="nb-matrix" onclick="showPane('matrix')"><div class="ni">⊞</div>매트릭스</button>
    <button class="nb" id="nb-memo" onclick="showPane('memo')"><div class="ni">📝</div>메모장</button>
    <button class="nb" id="nb-archive" onclick="showPane('archive')"><div class="ni">📦</div>완료 아카이브</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const QKEYS=['q1','q2','q3','q4'];
const QM={
  q1:{name:'긴급O 중요O',sub:'지금 처리',cls:'q1c',color:'var(--red)'},
  q2:{name:'긴급X 중요O',sub:'시간 확보',cls:'q2c',color:'var(--amb)'},
  q3:{name:'긴급O 중요X',sub:'권한 위임',cls:'q3c',color:'var(--blu)'},
  q4:{name:'긴급X 중요X',sub:'완전 삭제',cls:'q4c',color:'var(--gry)'}
};

// ── 사용자 설정 ───────────────────────────────────────
const URL_PARAMS=new URLSearchParams(window.location.search);
const CURRENT_USER=URL_PARAMS.get('user')||'default';
const SK='sp_'+CURRENT_USER; // 스토리지 키 접두사

// ── 로컬스토리지 ──────────────────────────────────────
function lsGet(k,def){try{const v=localStorage.getItem(SK+'_'+k);return v?JSON.parse(v):def;}catch{return def;}}
function lsSet(k,v){try{localStorage.setItem(SK+'_'+k,JSON.stringify(v));}catch{}}

// ── 상태 ──────────────────────────────────────────────
let tasks=lsGet('tasks',{q1:[],q2:[],q3:[],q4:[]});
let inbox=lsGet('inbox',[]);
let todayItems=lsGet('today',[]);
let saveTimer=null;
let syncInProgress=false;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

// ── 서버 통신 (Apps Script 직접 호출) ─────────────────
// 같은 도메인이므로 CORS 문제 없음
async function apiCall(params){
  const url=window.location.href.split('?')[0]+'?'+new URLSearchParams(params).toString();
  const res=await fetch(url);
  return await res.json();
}

async function syncNow(){
  if(syncInProgress)return;
  syncInProgress=true;
  setSyncStatus('동기화 중...',false);
  try{
    const d=await apiCall({action:'load',user:CURRENT_USER});
    if(d.error)throw new Error(d.error);
    if(d.tasks){tasks=d.tasks;lsSet('tasks',tasks);}
    if(d.inbox){inbox=d.inbox;lsSet('inbox',inbox);}
    if(d.today){todayItems=d.today;lsSet('today',todayItems);}
    if(d.focus!==undefined){
      const fi=document.getElementById('focusInp');
      if(fi){fi.value=d.focus;lsSet('focus',d.focus);}
    }
    setSyncStatus('동기화 완료 '+ft(new Date()),false);
    renderAll();
  }catch(e){
    setSyncStatus('오프라인 — 로컬 데이터 사용 중',true);
  }finally{
    syncInProgress=false;
  }
}

function scheduleSave(){
  lsSet('tasks',tasks);
  lsSet('today',todayItems);
  lsSet('inbox',inbox);
  clearTimeout(saveTimer);
  saveTimer=setTimeout(pushSave,1500);
}

async function pushSave(){
  try{
    const payload={
      action:'save',
      user:CURRENT_USER,
      tasks,inbox,
      today:todayItems,
      focus:lsGet('focus','')
    };
    const d=await apiCall(payload);
    if(d.ok)setSyncStatus('저장됨 '+ft(new Date()),false);
  }catch(e){
    setSyncStatus('오프라인 — 로컬에 저장됨',true);
  }
}

function setSyncStatus(msg,err){
  const el=document.getElementById('syncStatus');
  if(el){el.textContent=msg;el.style.color=err?'var(--red)':'var(--t3)';}
}
function ft(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

// ── 날짜 ─────────────────────────────────────────────
function daysLeft(ds){
  if(!ds)return null;
  const n=new Date();n.setHours(0,0,0,0);
  const t=new Date(ds);t.setHours(0,0,0,0);
  return Math.round((t-n)/86400000);
}
function fmtDate(iso){
  if(!iso)return '';
  const d=new Date(iso);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fmtDay(iso){
  const d=new Date(iso);
  const days=['일','월','화','수','목','금','토'];
  return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+')';
}

// ── 태그 HTML ─────────────────────────────────────────
function tagHTML(t){
  let h='';
  if(t.type==='proj')h+='<span class="tag tg-p">프로젝트</span>';
  if(t.assign==='team')h+='<span class="tag tg-t">팀</span>';
  if(t.assign==='wait')h+='<span class="tag tg-w">보류</span>';
  if(t.deadline){
    const d=daysLeft(t.deadline);
    if(d!==null){
      const txt=d<0?Math.abs(d)+'일 초과':d===0?'오늘마감':d+'일후';
      const col=d<=0?'var(--red)':d<=3?'var(--red)':d<=7?'var(--amb)':'var(--t3)';
      h+='<span class="tdays" style="color:'+col+'">'+txt+'</span>';
    }
  }
  return h;
}

// ── 오늘 할 일 ────────────────────────────────────────
function isInToday(id){return todayItems.some(x=>x.id===id);}

function toggleToday(q,id){
  const task=tasks[q]&&tasks[q].find(x=>x.id===id);
  if(!task||task.done)return;
  const idx=todayItems.findIndex(x=>x.id===id);
  if(idx>=0){todayItems.splice(idx,1);toast('오늘 목록에서 제거했어요');}
  else{todayItems.push({id,q,text:task.text});toast('오늘 할 일 '+todayItems.length+'번째 추가');}
  scheduleSave();renderMatrix();renderToday();
}

function renderToday(){
  const el=document.getElementById('todayList');
  const cnt=document.getElementById('todayCnt');
  if(!el)return;
  if(todayItems.length===0){
    el.innerHTML='<div class="today-empty">태스크 클릭 → 오늘 목록 추가 / 체크박스 → 완료</div>';
    cnt.textContent='';return;
  }
  const doneC=todayItems.filter(x=>{const t=tasks[x.q]&&tasks[x.q].find(y=>y.id===x.id);return t&&t.done;}).length;
  cnt.textContent=doneC+'/'+todayItems.length+' 완료';
  el.innerHTML=todayItems.map((x,i)=>{
    const task=tasks[x.q]&&tasks[x.q].find(y=>y.id===x.id);
    const done=task&&task.done;
    const col=QM[x.q]?QM[x.q].color:'var(--t3)';
    return '<div class="td-item'+(done?' td-done':'')+'">'+
      '<div class="td-num">'+(done?'✓':i+1)+'</div>'+
      '<div class="td-qdot" style="background:'+col+'"></div>'+
      '<div class="td-text">'+esc(x.text)+'</div>'+
      '<button class="td-up" onclick="tdUp('+i+')">↑</button>'+
      '<button class="td-dn" onclick="tdDn('+i+')">↓</button>'+
      '<div class="td-chk" onclick="completeTask(\''+x.q+'\',\''+x.id+'\')">'+
        '<svg width="8" height="8" viewBox="0 0 8 8" fill="none" style="opacity:'+(done?1:0)+'">'+
        '<path d="M1 4l2 2 4-4" stroke="#0f0f0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      '</div>'+
      '<button class="td-del" onclick="tdDel('+i+')">✕</button>'+
    '</div>';
  }).join('');
}

function tdUp(i){if(i===0)return;[todayItems[i-1],todayItems[i]]=[todayItems[i],todayItems[i-1]];scheduleSave();renderToday();}
function tdDn(i){if(i>=todayItems.length-1)return;[todayItems[i],todayItems[i+1]]=[todayItems[i+1],todayItems[i]];scheduleSave();renderToday();}
function tdDel(i){todayItems.splice(i,1);scheduleSave();renderToday();renderMatrix();}

// ── 태스크 완료 ───────────────────────────────────────
function completeTask(q,id){
  const task=tasks[q]&&tasks[q].find(x=>x.id===id);
  if(!task)return;
  task.done=true;task.doneAt=new Date().toISOString();
  const ti=todayItems.findIndex(x=>x.id===id);
  if(ti>=0){todayItems.splice(ti,1);}
  scheduleSave();renderAll();toast('완료! ✓');
}
function undoTask(q,id){
  const task=tasks[q]&&tasks[q].find(x=>x.id===id);
  if(!task)return;
  task.done=false;task.doneAt=null;
  scheduleSave();renderAll();toast('다시 활성화했어요');
}
function deleteTask(q,id){
  tasks[q]=tasks[q].filter(x=>x.id!==id);
  const ti=todayItems.findIndex(x=>x.id===id);
  if(ti>=0){todayItems.splice(ti,1);}
  scheduleSave();renderAll();toast('삭제했어요');
}
function hardDelete(q,id){
  tasks[q]=tasks[q].filter(x=>x.id!==id);
  scheduleSave();renderAll();
}

// ── 매트릭스 ─────────────────────────────────────────
function moveTask(fromQ,id,toQ){
  const idx=tasks[fromQ].findIndex(x=>x.id===id);
  if(idx<0)return;
  const[task]=tasks[fromQ].splice(idx,1);
  tasks[toQ].push(task);
  const ti=todayItems.find(x=>x.id===id);
  if(ti)ti.q=toQ;
  scheduleSave();renderAll();toast(toQ.toUpperCase()+'로 이동했어요');
}
function addToQ(q,inp){
  const v=inp.value.trim();
  if(!v)return;
  tasks[q].push({id:uid(),text:v,type:'task',assign:'solo',deadline:'',done:false,doneAt:null});
  inp.value='';scheduleSave();renderAll();toast('추가됐어요');
}
function renderMatrix(){
  const grid=document.getElementById('matrixGrid');
  if(!grid)return;
  grid.innerHTML=QKEYS.map(q=>{
    const m=QM[q];
    const active=tasks[q].filter(x=>!x.done);
    const items=active.map(t=>{
      const inT=isInToday(t.id);
      const tidx=inT?todayItems.findIndex(x=>x.id===t.id)+1:0;
      return '<div class="ti'+(inT?' today-pick':'')+'">'+
        '<div class="tchk" onclick="event.stopPropagation();completeTask(\''+q+'\',\''+t.id+'\')">'+
          '<svg class="ck" width="9" height="9" viewBox="0 0 9 9" fill="none">'+
          '<path d="M1 4.5l2.5 2.5 4.5-4.5" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
        '</div>'+
        '<div class="tbody" onclick="toggleToday(\''+q+'\',\''+t.id+'\')">'+
          '<div class="tt" ondblclick="event.stopPropagation();startEdit(event,\''+q+'\',\''+t.id+'\')">'+esc(t.text)+'</div>'+
          '<div class="tmeta">'+tagHTML(t)+'</div>'+
        '</div>'+
        (inT?'<div class="today-num">'+tidx+'</div>':'')+
        '<div class="ti-right">'+
          QKEYS.filter(k=>k!==q).map(k=>'<button class="mv" onclick="event.stopPropagation();moveTask(\''+q+'\',\''+t.id+'\',\''+k+'\')">'+k.toUpperCase()+'</button>').join('')+
          '<button class="del-btn" onclick="event.stopPropagation();deleteTask(\''+q+'\',\''+t.id+'\')">✕</button>'+
        '</div>'+
      '</div>';
    }).join('');
    return '<div class="qcard '+m.cls+'">'+
      '<div class="qcard-hd">'+
        '<div class="qcard-hd-row">'+
          '<div class="qdot"></div>'+
          '<div class="qn">'+m.name+'</div>'+
          '<div class="qcnt">'+active.length+'</div>'+
        '</div>'+
        '<div class="qsub">'+m.sub+'</div>'+
      '</div>'+
      '<div class="qtask-list">'+
        (active.length===0?'<div style="font-size:11px;color:var(--t3);padding:10px;font-style:italic">없음</div>':items)+
      '</div>'+
      '<div class="q-add-row">'+
        '<input class="q-ai" id="qadd-'+q+'" placeholder="추가..." onkeydown="if(event.key===\'Enter\'){addToQ(\''+q+'\',this);event.stopPropagation()}">'+
        '<button class="q-ab" onclick="addToQ(\''+q+'\',document.getElementById(\'qadd-'+q+'\'))">+</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function startEdit(e,q,id){
  e.stopPropagation();
  const el=e.currentTarget;
  const task=tasks[q]&&tasks[q].find(x=>x.id===id);
  if(!task)return;
  const orig=task.text;
  el.contentEditable='true';
  el.style.outline='1px solid var(--amb)';
  el.style.borderRadius='3px';
  el.style.padding='1px 3px';
  el.focus();
  const r=document.createRange();r.selectNodeContents(el);
  const s=window.getSelection();s.removeAllRanges();s.addRange(r);
  function finish(){
    el.contentEditable='false';
    el.style.outline='';el.style.borderRadius='';el.style.padding='';
    const nv=el.textContent.trim();
    if(nv&&nv!==orig){
      task.text=nv;
      const ti=todayItems.find(x=>x.id===id);
      if(ti)ti.text=nv;
      scheduleSave();renderMatrix();renderToday();toast('수정됐어요');
    }else{el.textContent=orig;}
  }
  el.onblur=finish;
  el.onkeydown=ev=>{ev.stopPropagation();if(ev.key==='Enter'){ev.preventDefault();el.blur();}if(ev.key==='Escape'){el.textContent=orig;el.blur();}};
}

// ── 인박스 ────────────────────────────────────────────
function quickAdd(){
  const inp=document.getElementById('qi');
  const v=inp.value.trim();
  if(!v)return;
  inbox.push(v);inp.value='';
  scheduleSave();renderInbox();toast('인박스에 추가 → 분류하세요');
}
function sortInbox(i,q){
  const text=inbox[i];
  inbox.splice(i,1);
  tasks[q].push({id:uid(),text,type:'task',assign:'solo',deadline:'',done:false,doneAt:null});
  scheduleSave();renderAll();toast(q.toUpperCase()+'로 분류했어요');
}
function delInbox(i){inbox.splice(i,1);scheduleSave();renderInbox();}
function renderInbox(){
  const wrap=document.getElementById('ibWrap');
  const list=document.getElementById('ibList');
  const cnt=document.getElementById('ibCnt');
  if(!wrap)return;
  if(inbox.length===0){wrap.classList.remove('on');return;}
  wrap.classList.add('on');cnt.textContent=inbox.length;
  list.innerHTML=inbox.map((item,i)=>
    '<div class="ib-item">'+
      '<div class="ib-text">'+esc(item)+'</div>'+
      '<div class="ib-btns">'+
        '<button class="ibb ibb1" onclick="sortInbox('+i+',\'q1\')">Q1</button>'+
        '<button class="ibb ibb2" onclick="sortInbox('+i+',\'q2\')">Q2</button>'+
        '<button class="ibb ibb3" onclick="sortInbox('+i+',\'q3\')">Q3</button>'+
        '<button class="ibb ibb4" onclick="sortInbox('+i+',\'q4\')">Q4</button>'+
        '<button class="ibb-x" onclick="delInbox('+i+')">✕</button>'+
      '</div>'+
    '</div>'
  ).join('');
}

// ── 통계 ─────────────────────────────────────────────
function renderStats(){
  const all=QKEYS.flatMap(q=>tasks[q]);
  const active=all.filter(x=>!x.done);
  const done=all.filter(x=>x.done);
  const el=document.getElementById('statsRow');
  if(!el)return;
  el.innerHTML=
    '<div class="stat"><div class="sn sn-r">'+tasks.q1.filter(x=>!x.done).length+'</div><div class="sl">긴급·중요</div></div>'+
    '<div class="stat"><div class="sn sn-a">'+tasks.q2.filter(x=>!x.done).length+'</div><div class="sl">중요·여유</div></div>'+
    '<div class="stat"><div class="sn sn-w">'+active.length+'</div><div class="sl">전체 진행중</div></div>'+
    '<div class="stat"><div class="sn sn-g">'+done.length+'</div><div class="sl">완료</div></div>';
  const dc=document.getElementById('doneCnt');
  if(dc)dc.textContent=done.length;
}

// ── 완료 목록 ─────────────────────────────────────────
function toggleDoneSection(){
  const sec=document.getElementById('doneSection');
  const cnt=document.getElementById('doneCnt');
  sec.classList.toggle('on');
  const isOn=sec.classList.contains('on');
  document.getElementById('doneToggle').textContent=isOn?'▾ 완료 항목 숨기기':'▸ 완료 항목 보기 ('+cnt.textContent+'개)';
}
function renderDone(){
  const sec=document.getElementById('doneSection');
  if(!sec)return;
  const all=QKEYS.flatMap(q=>tasks[q].filter(x=>x.done).map(x=>({...x,q})));
  sec.innerHTML=all.map(t=>
    '<div class="di" onclick="undoTask(\''+t.q+'\',\''+t.id+'\')">'+
      '<div class="di-chk"><svg width="7" height="7" viewBox="0 0 7 7" fill="none"><path d="M1 3.5l1.5 1.5 3.5-3.5" stroke="#0f0f0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
      '<div class="di-text">'+esc(t.text)+'</div>'+
      '<div class="di-date">'+(t.doneAt?fmtDate(t.doneAt):'')+'</div>'+
      '<button class="di-del" onclick="event.stopPropagation();hardDelete(\''+t.q+'\',\''+t.id+'\')">✕</button>'+
    '</div>'
  ).join('');
}

// ── 아카이브 ─────────────────────────────────────────
function renderArchive(){
  const el=document.getElementById('archiveList');
  if(!el)return;
  const all=QKEYS.flatMap(q=>tasks[q].filter(x=>x.done&&x.doneAt).map(x=>({...x,q})));
  if(all.length===0){el.innerHTML='<div class="arch-empty">완료한 항목이 없어요.</div>';return;}
  const groups={};
  all.forEach(t=>{
    const d=new Date(t.doneAt);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(!groups[k])groups[k]=[];groups[k].push(t);
  });
  const keys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=keys.map(k=>{
    const items=groups[k].sort((a,b)=>new Date(b.doneAt)-new Date(a.doneAt));
    return '<div class="arch-day">'+
      '<div class="arch-day-hd"><div class="arch-date">'+fmtDay(items[0].doneAt)+'</div><div class="arch-cnt">'+items.length+'개 완료</div></div>'+
      items.map(t=>{
        const col=QM[t.q].color;
        const d=new Date(t.doneAt);
        const hm=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
        return '<div class="arch-item">'+
          '<div class="arch-chk"><svg width="7" height="7" viewBox="0 0 7 7" fill="none"><path d="M1 3.5l1.5 1.5 3.5-3.5" stroke="#0f0f0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
          '<div class="arch-text">'+esc(t.text)+'</div>'+
          '<div class="arch-q" style="background:'+qbg(t.q)+';color:'+col+'">'+t.q.toUpperCase()+'</div>'+
          '<div class="arch-time">'+hm+'</div>'+
        '</div>';
      }).join('')+
    '</div>';
  }).join('');
}
function qbg(q){return{q1:'var(--rbg)',q2:'var(--abg)',q3:'var(--bbg)',q4:'var(--gbg)'}[q]||'var(--gbg)';}

// ── 메모 ─────────────────────────────────────────────
function initMemo(){
  const ta=document.getElementById('memoArea');
  if(!ta)return;
  ta.value=lsGet('memo','')||'';
  ta.addEventListener('input',()=>{
    lsSet('memo',ta.value);
    const mf=document.getElementById('memoFooter');
    if(mf)mf.textContent=ta.value.length>0?ta.value.length+'자 · 자동저장됨':'';
  });
}

// ── 뷰 전환 ──────────────────────────────────────────
function showPane(name){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const pane=document.getElementById('pane-'+name);
  const btn=document.getElementById('nb-'+name);
  if(pane)pane.classList.add('on');
  if(btn)btn.classList.add('active');
  if(name==='archive')renderArchive();
}

// ── 토스트 ────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200);
}

// ── 전체 렌더 ─────────────────────────────────────────
function renderAll(){
  renderMatrix();renderToday();renderStats();renderDone();renderInbox();
}

// ── 초기화 ────────────────────────────────────────────
document.getElementById('qi').addEventListener('keydown',e=>{if(e.key==='Enter')quickAdd();});
const fi=document.getElementById('focusInp');
fi.value=lsGet('focus','')||'';
fi.addEventListener('input',()=>{
  lsSet('focus',fi.value);
  clearTimeout(fi._st);
  fi._st=setTimeout(()=>pushSave(),2000);
});
const DAY=['일','월','화','수','목','금','토'];
const NOW=new Date();
document.getElementById('dtLabel').textContent=(NOW.getMonth()+1)+'월 '+NOW.getDate()+'일 ('+DAY[NOW.getDay()]+')';
const ul=document.getElementById('userLabel');
if(ul&&CURRENT_USER!=='default')ul.textContent=CURRENT_USER;
initMemo();
renderAll();
// 시작할 때 서버에서 최신 데이터 불러오기
syncNow();
// 5분마다 자동 동기화
setInterval(syncNow,5*60*1000);
</script>
